{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap");

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #dfdfdf;
    }

    .login-box {
      display: flex;
      justify-content: center;
      flex-direction: column;
      width: 440px;
      height: 480px;
      padding: 30px;
    }

    .login-header {
      text-align: center;
      margin: 20px 0 40px 0;
    }

    .login-header header {
      color: #333;
      font-size: 30px;
      font-weight: 600;
    }

    .input-box .input-field {
      width: 100%;
      height: 60px;
      font-size: 17px;
      padding: 0 25px;
      margin-bottom: 15px;
      border-radius: 30px;
      border: none;
      box-shadow: 0px 5px 10px 1px rgba(0, 0, 0, 0.05);
      outline: none;
      transition: 0.3s;
    }

    ::placeholder {
      font-weight: 500;
      color: #222;
    }

    .input-field:focus {
      width: 105%;
    }

    .input-submit {
      position: relative;
    }

    .submit-btn {
      width: 100%;
      height: 60px;
      background: #222;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      color: #fff;
      font-weight: 600;
      font-size: 18px;
    }

    .submit-btn:hover {
      background: #000;
      transform: scale(1.05, 1);
    }

    /* Admin Panel Style Messages */
    #messages-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      width: 300px;
    }
    .message {
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 5px;
      color: #fff;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      font-size: 14px;
      opacity: 1;
      transition: opacity 0.6s ease;
    }
    .message.success { background-color: #28a745; }
    .message.error { background-color: #dc3545; }
    .message.warning { background-color: #ffc107; color: #000; }
    .message.info { background-color: #17a2b8; }
  </style>

  <title>Login</title>
</head>

<body>
<div id="messages-container">
  {% if messages %}
  {% for message in messages %}
  <div class="message {{ message.tags }}">
    {{ message }}
  </div>
  {% endfor %}
  {% endif %}
</div>
  <form method="post">
    {% csrf_token %}

    <div class="login-box">

      <div class="login-header">
        <header>Login</header>
      </div>

      <div class="input-box">
        <input type="text" name="username" class="input-field" placeholder="Username" required autocomplete="off">
      </div>

      <div class="input-box">
        <input type="password" name="password" class="input-field" placeholder="Password" required autocomplete="off">
      </div>

      <div style="text-align: right; margin-top: -10px; margin-bottom: 20px; padding-right: 10px;">
        <a href="{% url 'password_reset' %}" style="color: #222; text-decoration: none; font-size: 14px; font-weight: 500;">Forgot Password?</a>
      </div>

      <div class="input-submit">
        <button type="submit" class="submit-btn">Sign In</button>
      </div>

    </div>
  </form>

  <script src="{% static 'js/admin.js' %}"></script>

</body>

</html>

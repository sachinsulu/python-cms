{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap");

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #dfdfdf;
    }

    .login-box {
      display: flex;
      justify-content: center;
      flex-direction: column;
      width: 440px;
      height: 480px;
      padding: 30px;
    }

    .login-header {
      text-align: center;
      margin: 20px 0 40px 0;
    }

    .login-header header {
      color: #333;
      font-size: 30px;
      font-weight: 600;
    }

    .input-box .input-field {
      width: 100%;
      height: 60px;
      font-size: 17px;
      padding: 0 25px;
      margin-bottom: 15px;
      border-radius: 30px;
      border: none;
      box-shadow: 0px 5px 10px 1px rgba(0, 0, 0, 0.05);
      outline: none;
      transition: 0.3s;
    }

    ::placeholder {
      font-weight: 500;
      color: #222;
    }

    .input-field:focus {
      width: 105%;
    }

    .input-submit {
      position: relative;
    }

    .submit-btn {
      width: 100%;
      height: 60px;
      background: #222;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      color: #fff;
      font-weight: 600;
      font-size: 18px;
    }

    .submit-btn:hover {
      background: #000;
      transform: scale(1.05, 1);
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .login-footer a {
      color: #222;
      text-decoration: none;
      font-weight: 500;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    p {
      margin-bottom: 20px;
      text-align: center;
      color: #444;
      font-size: 15px;
      line-height: 1.5;
    }

    /* Admin Panel Style Messages — same as login */
    #messages-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      width: 300px;
    }
    .message {
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 5px;
      color: #fff;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      font-size: 14px;
      opacity: 1;
      transition: opacity 0.6s ease;
    }
    .message.success { background-color: #28a745; }
    .message.error   { background-color: #dc3545; }
    .message.warning { background-color: #ffc107; color: #000; }
    .message.info    { background-color: #17a2b8; }
  </style>
  <title>Reset Password</title>
</head>
<body>

  <div id="messages-container">
    {% if messages %}
      {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  </div>

  <form method="post">
    {% csrf_token %}
    <div class="login-box">
      <div class="login-header">
        <header>Reset Password</header>
      </div>
      <p>Enter your email and we'll send you a link to reset your password.</p>
      <div class="input-box">
        <input type="email" name="email" class="input-field" placeholder="Email" required autocomplete="off">
      </div>
      <div class="input-submit">
        <button type="submit" class="submit-btn">Send Reset Link</button>
      </div>
      <div class="login-footer">
        <a href="{% url 'login' %}">Back to Login</a>
      </div>
    </div>
  </form>

  <script src="{% static 'js/admin.js' %}"></script>

</body>
</html>

{% extends 'hotelrudra/base.html' %}
{% load static %}

{% block title %}Facilities | {{ site_prefs.site_name }}{% endblock %}

{% block content %}


    <section class="banner-header bg-img" data-overlay-dark="5" data-background="{% static 'img/default.jpg' %}">
        <div class="container">
            <div class="row">
                <div class="col-md-12 text-center">
                    <div class="title">Facilities</div>
                    <!--<div class="subtitle"></div>-->
                </div>
            </div>
        </div>
    </section>

    <!-- Gallery Image -->
    <section class="amenities section-padding">
        <div class="container">
            <div class="row">
                {% for amenity in amenities %}
                <div class="col-lg-3 col-md-4">
                    <div class="item mb-25">
                        <div class="cont up">
                            <div class="icon"> <img src="{{ amenity.image_url }}"> </div>
                            <div class="text">
                                <h5>{{ amenity.title }}</h5>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>

{% endblock %}

{% extends 'hotelrudra/base.html' %}
{% load static %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<section style="min-height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 80px 20px;">
    <div>
        <h1 style="font-size: 120px; font-weight: 800; color: #5a3e2b; line-height: 1; margin: 0;">404</h1>
        <h2 style="font-size: 28px; margin: 16px 0 12px;">Page Not Found</h2>
        <p style="color: #777; font-size: 16px; margin-bottom: 32px;">
            The page you are looking for doesn't exist or has been moved.
        </p>
        <a href="/" style="
            display: inline-block;
            background-color: #5a3e2b;
            color: #fff;
            padding: 14px 36px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        ">Back to Home</a>
    </div>
</section>
{% endblock %}

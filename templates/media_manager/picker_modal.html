<!-- ═══════════════════════════════════════════════════════════
     MEDIA PICKER MODAL  — included once in base.html
     Activated by any element with data-media-picker attribute.
     ═══════════════════════════════════════════════════════════ -->

<div id="mediaPickerOverlay" style="display:none;">
  <div id="mediaPickerModal">

    <!-- Header -->
    <div class="mp-header">
      <div class="mp-header-left">
        <i class="fa-solid fa-photo-film"></i>
        <span>Media Library</span>
      </div>
      <button type="button" id="mediaPickerClose" class="mp-close-btn">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="mp-body">

      <!-- Sidebar -->
      <aside class="mp-sidebar">
        <div class="mp-sidebar-inner">
          <p class="mp-sidebar-label">Folders</p>
          <ul class="mp-folder-list" id="mpFolderList">
            <li>
              <button class="mp-folder-btn active" data-folder="">
                <i class="fa-solid fa-house"></i> All Media
              </button>
            </li>
            <!-- Populated by JS -->
          </ul>
        </div>

        <!-- Upload shortcut -->
        <a href="{% url 'upload_media' %}"
           target="_blank"
           class="mp-upload-link">
          <i class="fa-solid fa-upload"></i> Upload New File
        </a>
      </aside>

      <!-- Main -->
      <div class="mp-main">

        <!-- Toolbar -->
        <div class="mp-toolbar">
          <div class="mp-search-wrap">
            <i class="fa-solid fa-magnifying-glass mp-search-icon"></i>
            <input type="text"
                   id="mpSearch"
                   class="mp-search"
                   placeholder="Search files…"
                   autocomplete="off">
          </div>
          <div class="mp-type-tabs">
            <button class="mp-type-tab active" data-type="">All</button>
            <button class="mp-type-tab" data-type="image">
              <i class="fa-solid fa-image"></i> Images
            </button>
            <button class="mp-type-tab" data-type="video">
              <i class="fa-solid fa-video"></i> Videos
            </button>
            <button class="mp-type-tab" data-type="file">
              <i class="fa-solid fa-file"></i> Files
            </button>
          </div>
        </div>

        <!-- Stats bar -->
        <div class="mp-stats" id="mpStats">Loading…</div>

        <!-- Grid -->
        <div class="mp-grid" id="mpGrid">
          <!-- Items injected by JS -->
        </div>

        <!-- Pagination -->
        <div class="mp-pagination" id="mpPagination"></div>

        <!-- Loading / Empty states -->
        <div class="mp-loading" id="mpLoading">
          <i class="fa-solid fa-spinner fa-spin"></i> Loading…
        </div>
        <div class="mp-empty" id="mpEmpty" style="display:none;">
          <i class="fa-solid fa-photo-film"></i>
          <p>No files found.</p>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <div class="mp-footer">
      <div class="mp-selected-info" id="mpSelectedInfo">No file selected</div>
      <div class="mp-footer-actions">
        <button type="button" id="mediaPickerCancel" class="mp-btn-cancel">Cancel</button>
        <button type="button" id="mediaPickerInsert" class="mp-btn-insert" disabled>
          <i class="fa-solid fa-check"></i> Use This File
        </button>
      </div>
    </div>

  </div>
</div>

<style>
/* ── Overlay ── */
#mediaPickerOverlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(2px);
  animation: mpFadeIn 0.18s ease;
}
@keyframes mpFadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── Modal Shell ── */
#mediaPickerModal {
  background: #fff; border-radius: 14px;
  width: 92vw; max-width: 1020px;
  height: 84vh; max-height: 740px;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,0.22);
  animation: mpSlideUp 0.22s ease;
}
@keyframes mpSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0);    }
}

/* ── Header ── */
.mp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
  background: #f8fafc;
}
.mp-header-left {
  display: flex; align-items: center; gap: 8px;
  font-weight: 600; font-size: 0.95rem; color: #0f172a;
}
.mp-close-btn {
  width: 30px; height: 30px; border-radius: 7px;
  border: 1px solid #e2e8f0; background: white;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: #64748b;
  transition: all 0.15s;
}
.mp-close-btn:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }

/* ── Body ── */
.mp-body {
  display: flex; flex: 1; min-height: 0;
}

/* ── Sidebar ── */
.mp-sidebar {
  width: 190px; flex-shrink: 0;
  border-right: 1px solid #e2e8f0;
  display: flex; flex-direction: column;
  background: #f8fafc;
}
.mp-sidebar-inner { flex: 1; overflow-y: auto; padding: 12px; }
.mp-sidebar-label {
  font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: #94a3b8; margin: 0 0 8px 2px;
}
.mp-folder-list { list-style: none; padding: 0; margin: 0; }
.mp-folder-list li { margin-bottom: 2px; }
.mp-folder-btn {
  display: flex; align-items: center; gap: 7px;
  width: 100%; padding: 6px 10px;
  border: none; background: none; border-radius: 6px;
  font-size: 0.82rem; color: #374151; cursor: pointer;
  text-align: left; transition: background 0.12s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mp-folder-btn:hover { background: #e2e8f0; }
.mp-folder-btn.active { background: #0f172a; color: #fff; }
.mp-folder-children { padding-left: 14px; }
.mp-upload-link {
  display: flex; align-items: center; gap: 7px;
  padding: 12px; font-size: 0.8rem; font-weight: 600;
  color: #3b82f6; text-decoration: none;
  border-top: 1px solid #e2e8f0;
  transition: background 0.12s;
}
.mp-upload-link:hover { background: #eff6ff; }

/* ── Main ── */
.mp-main {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0; overflow: hidden;
}

/* ── Toolbar ── */
.mp-toolbar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; border-bottom: 1px solid #f1f5f9;
  flex-shrink: 0; flex-wrap: wrap;
}
.mp-search-wrap { position: relative; flex: 1; min-width: 140px; }
.mp-search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); color: #94a3b8;
  font-size: 0.8rem; pointer-events: none;
}
.mp-search {
  width: 100%; padding: 7px 12px 7px 30px;
  border: 1px solid #d1d5db; border-radius: 7px;
  font-size: 0.83rem; outline: none;
  transition: border-color 0.15s;
  box-sizing: border-box;
}
.mp-search:focus { border-color: #0f172a; }
.mp-type-tabs { display: flex; gap: 5px; }
.mp-type-tab {
  padding: 5px 11px; border-radius: 6px;
  border: 1px solid #e2e8f0; background: #fff;
  font-size: 0.76rem; font-weight: 500; cursor: pointer;
  color: #374151; transition: all 0.15s; display: flex;
  align-items: center; gap: 4px;
}
.mp-type-tab:hover { border-color: #94a3b8; }
.mp-type-tab.active { background: #0f172a; color: #fff; border-color: #0f172a; }

/* ── Stats ── */
.mp-stats {
  padding: 6px 16px; font-size: 0.75rem;
  color: #94a3b8; border-bottom: 1px solid #f1f5f9;
  flex-shrink: 0;
}

/* ── Grid ── */
.mp-grid {
  flex: 1; overflow-y: auto;
  padding: 14px 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
  align-content: start;
}

/* ── Media Card ── */
.mp-item {
  border: 2px solid #e2e8f0; border-radius: 8px;
  overflow: hidden; cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  background: #fff;
}
.mp-item:hover { border-color: #94a3b8; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.mp-item.selected { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
.mp-item.selected .mp-item-thumb::after {
  content: '\f00c';
  font-family: 'Font Awesome 6 Free'; font-weight: 900;
  position: absolute; top: 5px; right: 5px;
  width: 20px; height: 20px;
  background: #3b82f6; color: #fff;
  border-radius: 50%; font-size: 0.65rem;
  display: flex; align-items: center; justify-content: center;
}
.mp-item-thumb {
  width: 100%; height: 95px;
  background: #f1f5f9;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.mp-item-thumb img { width: 100%; height: 100%; object-fit: cover; }
.mp-item-thumb .mp-file-icon { font-size: 1.8rem; color: #94a3b8; }
.mp-item-info { padding: 6px 8px; }
.mp-item-name {
  font-size: 0.72rem; font-weight: 500; color: #374151;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.mp-item-meta { font-size: 0.65rem; color: #94a3b8; margin-top: 1px; }

/* ── Loading / Empty ── */
.mp-loading, .mp-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #94a3b8; gap: 10px; font-size: 0.9rem;
  padding: 40px;
}
.mp-empty i { font-size: 2.5rem; }
.mp-loading i { font-size: 1.5rem; }

/* ── Pagination ── */
.mp-pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 10px 16px;
  border-top: 1px solid #f1f5f9; flex-shrink: 0;
}
.mp-page-btn {
  padding: 5px 12px; border: 1px solid #e2e8f0;
  background: #fff; border-radius: 6px;
  font-size: 0.78rem; cursor: pointer;
  transition: all 0.12s; color: #374151;
}
.mp-page-btn:hover:not(:disabled) { background: #0f172a; color: #fff; border-color: #0f172a; }
.mp-page-btn:disabled { opacity: 0.35; cursor: default; }
.mp-page-info { font-size: 0.78rem; color: #6b7280; }

/* ── Footer ── */
.mp-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-top: 1px solid #e2e8f0;
  background: #f8fafc; flex-shrink: 0; gap: 12px;
}
.mp-selected-info { font-size: 0.82rem; color: #64748b; flex: 1; }
.mp-footer-actions { display: flex; gap: 8px; }
.mp-btn-cancel {
  padding: 8px 18px; border-radius: 7px;
  border: 1px solid #d1d5db; background: #fff;
  font-size: 0.85rem; cursor: pointer; color: #374151;
  transition: all 0.15s;
}
.mp-btn-cancel:hover { background: #f1f5f9; }
.mp-btn-insert {
  padding: 8px 20px; border-radius: 7px;
  border: none; background: #3b82f6;
  font-size: 0.85rem; font-weight: 600;
  cursor: pointer; color: #fff;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.15s;
}
.mp-btn-insert:hover:not(:disabled) { background: #2563eb; }
.mp-btn-insert:disabled { background: #94a3b8; cursor: default; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .mp-sidebar { display: none; }
  #mediaPickerModal { width: 100vw; height: 100vh; border-radius: 0; max-width: none; max-height: none; }
}
</style>

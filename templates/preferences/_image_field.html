<div class="form-group">
  <label>{{ label }}{% if help %} <small class="help-text" style="font-weight:400;">— {{ help }}</small>{% endif %}</label>
  <input type="hidden" name="remove_{{ field_name }}" id="remove_{{ field_name }}" value="0">
  <div class="input-file-container">
    {% if current %}
      <input type="file" name="{{ field_name }}" accept="image/*"
             id="id_{{ field_name }}" data-existing-image="{{ current.url }}">
    {% else %}
      {{ field }}
    {% endif %}
  </div>
  <small class="help-text">Allowed: JPG, PNG, WebP | Max 2MB | Max 1920×1280px</small>
  <div id="{{ field_name }}Preview" class="mt-2">
    {% if current %}
      <div class="preview-wrapper" style="position:relative; display:inline-block; margin-top:10px;">
        <img src="{{ current.url }}"
             style="max-width:200px; max-height:120px; object-fit:contain;
                    border:1px solid #e5e7eb; border-radius:4px; display:block;">
        <span class="remove-image"
              data-target="remove_{{ field_name }}"
              style="position:absolute; top:-8px; right:-8px; background:#ef4444; color:white;
                     border-radius:50%; width:24px; height:24px; text-align:center;
                     line-height:24px; cursor:pointer; font-weight:bold; font-size:16px;">×</span>
        <p style="margin-top:4px; font-size:11px; color:#9ca3af;">Current image</p>
      </div>
    {% else %}
      <p class="no-image text-muted">No image selected</p>
    {% endif %}
  </div>
  {% if field.errors %}<div class="error">{{ field.errors }}</div>{% endif %}
</div>
